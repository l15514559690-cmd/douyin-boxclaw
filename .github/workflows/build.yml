name: Build Windows EXE

on:
  push:
    branches: [ "main", "master" ] # 只要代码更新就自动打包
  workflow_dispatch: # 允许你手动点击按钮打包

jobs:
  build:
    runs-on: windows-latest # 免费借用 GitHub 的 Windows 电脑

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 设定 Python 版本
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6 pyngrok flask requests pyinstaller
        
    - name: Build EXE with PyInstaller
      run: pyinstaller --noconfirm --windowed --name "DouyinBoxClaw" app.py
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DouyinBoxClaw-Windows
        path: dist/DouyinBoxClaw/
